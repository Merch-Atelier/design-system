<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:24px 32px; background:#FAFAF7; }
  .row { display:flex; align-items:baseline; gap:20px; padding: 10px 0; border-top: 1px solid rgba(36,36,36,0.08); }
  .row:first-child { border-top: none; }
  .size { font-family: var(--font-mono); font-size: 11px; color:#6E685D; width: 64px; flex-shrink:0; }
  .sample { font-family: var(--font-display); color:#242424; line-height:1.1; }
  .sample em { font-style: italic; color:#8C7A65; font-weight:400; }
</style>
</head>
<body>
  <div class="row"><span class="size">32 / xl</span><span class="sample" style="font-size:32px; font-weight:500;">A refined section title</span></div>
  <div class="row"><span class="size">48 / 2xl</span><span class="sample" style="font-size:48px;">Enduring <em>pieces.</em></span></div>
  <div class="row"><span class="size">64 / 3xl</span><span class="sample" style="font-size:64px; letter-spacing:-.01em;"><em>Atelier.</em></span></div>
</body>
</html>
