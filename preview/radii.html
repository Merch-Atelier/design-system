<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:24px; background:#FAFAF7; }
  .row { display:grid; grid-template-columns: repeat(5, 1fr); gap:18px; }
  .item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .tile { width: 64px; height: 64px; background:#FFFFFF; border: 1px solid rgba(36,36,36,0.12); box-shadow: 0 1px 2px rgba(36,36,36,.04); }
  .label { font-family: var(--font-mono); font-size: 11px; color:#6E685D; }
</style>
</head>
<body>
  <div class="row">
    <div class="item"><div class="tile" style="border-radius:2px;"></div><span class="label">xs · 2</span></div>
    <div class="item"><div class="tile" style="border-radius:4px;"></div><span class="label">sm · 4</span></div>
    <div class="item"><div class="tile" style="border-radius:6px;"></div><span class="label">md · 6</span></div>
    <div class="item"><div class="tile" style="border-radius:8px;"></div><span class="label">lg · 8</span></div>
    <div class="item"><div class="tile" style="border-radius:12px;"></div><span class="label">xl · 12</span></div>
  </div>
</body>
</html>
