<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:24px 32px; background:#FAFAF7; }
  .row { display:flex; align-items:baseline; gap:20px; padding: 8px 0; border-top: 1px solid rgba(36,36,36,0.08); }
  .row:first-child { border-top: none; }
  .size { font-family: var(--font-mono); font-size: 11px; color:#6E685D; width: 64px; flex-shrink:0; }
  .sample { font-family: var(--font-sans); color:#242424; }
</style>
</head>
<body>
  <div class="row"><span class="size">12 / xs</span><span class="sample" style="font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.12em;">Eyebrow label</span></div>
  <div class="row"><span class="size">14 / sm</span><span class="sample" style="font-size:14px; font-weight:500;">UI label · navigation</span></div>
  <div class="row"><span class="size">16 / base</span><span class="sample" style="font-size:16px;">Body copy in Montserrat Regular.</span></div>
  <div class="row"><span class="size">18 / md</span><span class="sample" style="font-size:18px; font-weight:500;">Intro paragraph / heading</span></div>
  <div class="row"><span class="size">24 / lg</span><span class="sample" style="font-size:24px; font-weight:600;">Sub-section heading</span></div>
</body>
</html>
