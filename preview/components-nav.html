<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
<style>
  body { margin:0; padding:32px; background:#F5F3ED; display:flex; justify-content:center; }
  .nav {
    background: rgba(245,243,237,.82); backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(36,36,36,.08);
    display:flex; align-items:center; justify-content:space-between;
    padding: 14px 24px; width: 720px; border-radius: 10px;
    box-shadow: 0 1px 2px rgba(36,36,36,.04);
  }
  .logo { font-family: var(--font-sans); font-weight:700; font-size:14px; letter-spacing:.14em; color:#242424; }
  .logo em { font-family: var(--font-display); font-style:italic; font-weight:400; letter-spacing:.02em; color:#8C7A65; margin-left: 4px; }
  .links { display:flex; gap: 26px; }
  .links a { font-family: var(--font-sans); font-size:13px; font-weight:500; color:#242424; text-decoration:none; letter-spacing:.02em; }
  .links a:hover { color:#8C7A65; }
  .right { display:flex; align-items:center; gap: 14px; }
  .right i { font-size:18px; color:#242424; }
  .cta {
    font-family: var(--font-sans); font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:.12em;
    background:#242424; color:#F5F3ED; padding:10px 14px; border-radius:6px; text-decoration:none;
  }
</style>
</head>
<body>
  <nav class="nav">
    <div class="logo">MERCH <em>Atelier</em></div>
    <div class="links">
      <a>Catalog</a><a>Case studies</a><a>The studio</a><a>Journal</a>
    </div>
    <div class="right">
      <i class="ph ph-magnifying-glass"></i>
      <i class="ph ph-user-circle"></i>
      <a class="cta">Request a quote</a>
    </div>
  </nav>
</body>
</html>
