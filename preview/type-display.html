<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:28px 32px; background:#F5F3ED; }
  .eyebrow { display:block; margin-bottom: 10px; }
  .headline { font-family: var(--font-display); font-weight:400; font-size: 56px; line-height:1.05; letter-spacing:-0.01em; color:#242424; margin:0; }
  .headline em { font-style: italic; color:#8C7A65; font-weight:400; }
  .sub { font-family: var(--font-display); font-style: italic; font-size: 18px; color:#8C7A65; margin-top: 10px; line-height:1.3; }
</style>
</head>
<body>
  <span class="eyebrow" style="font-family: var(--font-sans); font-weight:700; font-size:12px; text-transform:uppercase; letter-spacing:.12em; color:#8C7A65;">Spring Collection · 2026</span>
  <h1 class="headline">Considered goods,<br/><em>built to be kept.</em></h1>
  <div class="sub">A signature italic moment, set in Dusty Taupe.</div>
</body>
</html>
