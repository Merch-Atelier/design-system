<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:24px 32px; background:#FAFAF7; color:#242424; }
  .block { max-width: 560px; }
  .body { font-family: var(--font-sans); font-size:16px; line-height:1.65; color:#4A453E; margin:0 0 14px; }
  .quote { font-family: var(--font-display); font-style: italic; font-size: 22px; line-height:1.35; color:#242424; border-left: 2px solid #8C7A65; padding-left: 16px; margin: 16px 0; }
  .meta { font-family: var(--font-sans); font-size: 12px; font-weight:500; letter-spacing:.02em; color:#6E685D; }
</style>
</head>
<body>
  <div class="block">
    <p class="body">We treat every run as a collection, not a purchase order — from fabric-weight to fold-line, each decision is considered in partnership with you.</p>
    <blockquote class="quote">"They made our fifteenth-anniversary piece feel like an heirloom."</blockquote>
    <div class="meta">Eliza Marsh · Field &amp; Forth Coffee</div>
  </div>
</body>
</html>
