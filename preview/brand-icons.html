<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
<style>
  body { margin:0; padding:24px; background:#FAFAF7; display:grid; grid-template-columns: repeat(8, 1fr); gap:20px; text-align:center; }
  .cell { display:flex; flex-direction:column; align-items:center; gap:8px; color:#242424; }
  .cell i { font-size: 26px; }
  .cell span { font-family: var(--font-mono); font-size: 10px; color:#6E685D; }
</style>
</head>
<body>
  <div class="cell"><i class="ph ph-squares-four"></i><span>catalog</span></div>
  <div class="cell"><i class="ph ph-shopping-bag"></i><span>collection</span></div>
  <div class="cell"><i class="ph ph-file-text"></i><span>quote</span></div>
  <div class="cell"><i class="ph ph-image-square"></i><span>proof</span></div>
  <div class="cell"><i class="ph ph-users-three"></i><span>studio</span></div>
  <div class="cell"><i class="ph ph-package"></i><span>production</span></div>
  <div class="cell"><i class="ph ph-truck"></i><span>shipped</span></div>
  <div class="cell"><i class="ph ph-chat-circle"></i><span>message</span></div>
</body>
</html>
