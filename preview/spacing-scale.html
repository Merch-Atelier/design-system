<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:24px; background:#FAFAF7; }
  .grid { display:flex; align-items:flex-end; gap:20px; }
  .bar { background:#8C7A65; width: 28px; border-radius: 3px; position:relative; }
  .bar::after {
    content: attr(data-px);
    position:absolute; bottom:-22px; left:50%; transform:translateX(-50%);
    font-family: var(--font-mono); font-size: 10px; color:#6E685D;
  }
  .bar span {
    position:absolute; top:-18px; left:50%; transform:translateX(-50%);
    font-family: var(--font-sans); font-size: 10px; font-weight:600; color:#242424;
    background:#F5F3ED; padding: 1px 4px; border-radius: 2px;
  }
</style>
</head>
<body>
  <div class="grid">
    <div class="bar" style="height:4px;" data-px="4"><span>1</span></div>
    <div class="bar" style="height:8px;" data-px="8"><span>2</span></div>
    <div class="bar" style="height:12px;" data-px="12"><span>3</span></div>
    <div class="bar" style="height:16px;" data-px="16"><span>4</span></div>
    <div class="bar" style="height:24px;" data-px="24"><span>5</span></div>
    <div class="bar" style="height:32px;" data-px="32"><span>6</span></div>
    <div class="bar" style="height:48px;" data-px="48"><span>7</span></div>
    <div class="bar" style="height:64px;" data-px="64"><span>8</span></div>
    <div class="bar" style="height:96px;" data-px="96"><span>9</span></div>
  </div>
</body>
</html>
