<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:28px 32px; background:#FAFAF7; display:grid; grid-template-columns: 1fr 1fr; gap:20px 32px; }
  label { display:block; }
  .lbl { font-family: var(--font-sans); font-size:12px; font-weight:700; text-transform:uppercase; letter-spacing:.12em; color:#4A453E; margin-bottom:8px; }
  .field {
    width:100%; box-sizing:border-box;
    font-family: var(--font-sans); font-size:14px; color:#242424;
    padding: 12px 14px; border:1px solid rgba(36,36,36,.22); border-radius: 6px; background:#FFFFFF;
    transition: border-color 180ms cubic-bezier(.22,.61,.36,1), box-shadow 180ms cubic-bezier(.22,.61,.36,1);
  }
  .field::placeholder { color:#8F887B; }
  .field.focus { border-color:#242424; box-shadow: 0 0 0 3px rgba(140,122,101,.30); outline:none; }
  .help { font-family: var(--font-sans); font-size:12px; color:#6E685D; margin-top:6px; }
  .err .field { border-color:#B04A3B; }
  .err .help { color:#B04A3B; }
</style>
</head>
<body>
  <label>
    <span class="lbl">Contact email</span>
    <input class="field" type="email" value="studio@fieldandforth.co" />
    <div class="help">We'll send your proof here.</div>
  </label>
  <label>
    <span class="lbl">Run size</span>
    <input class="field focus" type="text" placeholder="250" />
    <div class="help">Minimums start at 50 pieces.</div>
  </label>
</body>
</html>
