<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:24px; background:#FAFAF7; }
  .wrap { display:flex; align-items:center; justify-content:center; gap:48px; }
  .logo { max-width: 320px; height: auto; display:block; }
  .dark { background:#242424; padding:28px 36px; border-radius:12px; }
  .dark .logo { max-width: 280px; }
</style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="../assets/logo-merch-atelier.png" alt="Merch Atelier" />
    <div class="dark">
      <img class="logo" src="../assets/logo-merch-atelier-light.png" alt="Merch Atelier" />
    </div>
  </div>
</body>
</html>
