<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../colors_and_type.css" />
<style>
  body { margin:0; padding:24px; background:#FAFAF7; }
  .row { display:grid; grid-template-columns: 1fr 1fr; gap:16px; }
  .sw {
    border-radius: 10px; padding:20px; height: 120px;
    display:flex; flex-direction:column; justify-content:space-between;
  }
  .sw .name { font-family: var(--font-display); font-style: italic; font-size: 22px; line-height:1; }
  .sw .meta { font-family: var(--font-mono); font-size: 12px; letter-spacing: 0.04em; }
  .sw .tag  { font-family: var(--font-sans); font-weight:700; font-size:11px; letter-spacing:.12em; text-transform:uppercase; opacity:.7; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw" style="background:#242424; color:#F5F3ED;">
      <span class="tag" style="color:#BAB3A3;">Primary</span>
      <div>
        <div class="name">Carbon Black</div>
        <div class="meta" style="color:#BAB3A3;">#242424</div>
      </div>
    </div>
    <div class="sw" style="background:#8C7A65; color:#242424;">
      <span class="tag" style="color:#3A342B;">Accent</span>
      <div>
        <div class="name">Dusty Taupe</div>
        <div class="meta" style="color:#3A342B;">#8C7A65</div>
      </div>
    </div>
  </div>
</body>
</html>
