<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Merch Atelier — Studio Admin</title>
<link rel="stylesheet" href="../../colors_and_type.css" />
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css" />
<style>
  html, body, #root { height: 100%; }
  body { margin:0; background:#F5F3ED; color:#242424; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- reuse storefront atoms (Button, Tag, Eyebrow, Field, ProductThumb) -->
<script type="text/babel" src="../storefront/Components.jsx"></script>
<script type="text/babel" src="AdminShell.jsx"></script>
<script type="text/babel" src="Quotes.jsx"></script>
<script type="text/babel" src="Orders.jsx"></script>
<script type="text/babel" src="Proofs.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;
function App() {
  const [view, setView] = useState(() => localStorage.getItem('ma_admin_view') || 'quotes');
  useEffect(() => { localStorage.setItem('ma_admin_view', view); }, [view]);

  const pages = {
    quotes: {
      title: 'Quote', italic: 'requests', subtitle: '47 open briefs',
      action: <Button variant="primary" icon="plus">New brief</Button>,
      body: <Quotes />,
    },
    orders: {
      title: 'Orders', italic: 'in flight', subtitle: '23 active runs',
      action: <Button variant="secondary" icon="download-simple">Export</Button>,
      body: <Orders />,
    },
    proofs: {
      title: 'Proof', italic: 'review', subtitle: 'Heavyweight Tee · MA-2608',
      action: <Button variant="ghost" icon="caret-left" onClick={()=>setView('orders')}>Back to orders</Button>,
      body: <Proofs />,
    },
    clients:  { title:'Clients',  italic:'', subtitle:'142 active partnerships', body: <Placeholder label="clients" /> },
    vendors:  { title:'Vendors',  italic:'', subtitle:'8 vetted makers',  body: <Placeholder label="vendors" /> },
    catalog:  { title:'Catalog',  italic:'', subtitle:'Internal library', body: <Placeholder label="catalog" /> },
    journal:  { title:'Journal',  italic:'', subtitle:'Studio notes',      body: <Placeholder label="journal" /> },
  };
  const p = pages[view] || pages.quotes;

  return (
    <AdminPage view={view} onNav={setView} title={p.title} italic={p.italic} subtitle={p.subtitle} action={p.action}>
      {p.body}
    </AdminPage>
  );
}

function Placeholder({ label }) {
  return (
    <div style={{ background:'#FFFFFF', padding: 48, borderRadius: 12, border:'1px solid rgba(36,36,36,.06)', textAlign:'center', color:'#6E685D', fontFamily:'"Playfair Display", serif', fontStyle:'italic', fontSize: 22 }}>
      The {label} view would live here.
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
